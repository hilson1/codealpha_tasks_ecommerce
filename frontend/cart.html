<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <main class="container">
      <h1>Your Shopping Cart</h1>

      <div class="cart-layout">
        <section class="cart-section">
          <div id="cart-items"></div>
        </section>

        <aside class="summary-section">
          <div id="cart-total" class="summary-card"></div>

          <div id="checkout-form" class="checkout-card">
            <h3>Shipping Address</h3>

            <input id="street" type="text" placeholder="Street" />

            <input id="city" type="text" placeholder="City" />

            <input id="zip" type="text" placeholder="ZIP Code" />

            <input id="country" type="text" placeholder="Country" />

            <button class="checkout-btn" onclick="placeOrder()">
              Place Order
            </button>
          </div>
        </aside>
      </div>
    </main>

    <script src="js/navbar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
